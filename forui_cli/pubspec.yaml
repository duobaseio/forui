name: forui_cli
description: >-
  Command-line tool for Forui: create a theme and generate the styling boilerplate for your Forui app.
version: 0.24.0
homepage: https://forui.dev/
documentation: https://forui.dev/docs
repository: https://github.com/duobaseio/forui/tree/main/forui_cli
issue_tracker: https://github.com/duobaseio/forui/issues
topics:
  - cli
  - forui
  - theme

environment:
  sdk: ">=3.12.0-0 <4.0.0"
  flutter: ">=3.44.0-0"
resolution: workspace

executables:
  forui: forui_cli

dependencies:
  args: ^2.7.0
  dart_style: ^3.1.0
  ffi: ^2.1.0
  flutter:
    sdk: flutter
  forui: ^0.23.0
  path: ^1.9.0
  yaml: ^3.1.3
  yaml_edit: ^2.2.2

dev_dependencies:
  analyzer: ^10.0.0
  code_builder: ^4.10.1
  collection: ^1.18.0
  flint: ^2.15.0
  lints: ^6.0.0
  sugar: ^4.0.0
  test: ^1.25.6
