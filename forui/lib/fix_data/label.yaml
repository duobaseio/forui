version: 1
transforms:
  # FLabel
  - title: 'Rename FLabel(axis: ...) to FLabel(layout: ...)'
    date: 2026-04-06
    element:
      uris: [ 'package:forui/forui.dart' ]
      constructor: ''
      inClass: FLabel
    changes:
      - kind: renameParameter
        oldName: 'axis'
        newName: 'layout'

  # FLabelStyles
  - title: 'Rename FLabelStyles.horizontalStyle to FLabelStyles.horizontalTrailingStyle'
    date: 2026-04-06
    element:
      uris: [ 'package:forui/forui.dart' ]
      getter: 'horizontalStyle'
      inClass: FLabelStyles
    changes:
      - kind: rename
        newName: 'horizontalTrailingStyle'

  - title: 'Rename FLabelStyles.horizontalStartStyle to FLabelStyles.horizontalLeadingStyle'
