      uris: [ 'package:forui/forui.dart' ]
      getter: 'horizontalEndStyle'
      inClass: FLabelStyles
    changes:
      - kind: rename
        newName: 'horizontalTrailingStyle'

  - title: 'Rename FLabelStyles(horizontalStyle: ...) to FLabelStyles(horizontalTrailingStyle: ...)'
