      constructor: 'inherit'
      inClass: FTypography
    changes:
      - kind: renameParameter
        oldName: 'defaultFontFamily'
        newName: 'fontFamily'

  - title: 'Rename FTypography.defaultFontFamily to FTypography.fontFamily'
    date: 2026-03-23
    element:
      uris: [ 'package:forui/forui.dart' ]
      getter: 'defaultFontFamily'
      inClass: FTypography
    changes:
      - kind: rename
        newName: 'fontFamily'
