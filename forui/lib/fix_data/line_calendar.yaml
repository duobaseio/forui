  # FLineCalendar
  - title: "Rename FLineCalendar(cacheExtent: ...) to FLineCalendar(scrollCacheExtent: ...)."
    date: 2026-05-19
    element:
      uris: [ 'package:forui/forui.dart' ]
      constructor: ''
      inClass: FLineCalendar
    changes:
      - kind: renameParameter
        oldName: 'cacheExtent'
        newName: 'scrollCacheExtent'

